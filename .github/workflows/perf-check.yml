name: Weekly Performance Check

on:
  schedule:
    - cron: '0 9 * * 1'  # Mondays 09:00 UTC
  workflow_dispatch:

jobs:
  perf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run PSI mobile audits
        env:
          PSI_API_KEY: ${{ secrets.PSI_API_KEY }}
        run: node scripts/perf-check.js
      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: perf-report
          path: seo-reports/perf-*.json
