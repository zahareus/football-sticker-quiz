name: Synthetic Monitor

# Loads every key page of the LIVE site in a real browser every 15 minutes and
# checks it actually works (no JS init failure, no critical console errors, main
# content rendered). On ANY failure it sends an immediate Telegram alert
# (Самаритянин bot) and the run goes red. All-green = silent.

on:
  schedule:
    - cron: '0 * * * *'   # hourly
  push:
    branches: [main]
    # Only app code — NOT auto-generated content commits (stickers/, clubs/,
    # countries/, cities/ live in subdirs; `*.ext` is root-only, so they're skipped).
    paths:
      - '*.html'
      - '*.js'
      - '*.css'
      - 'js/**'
      - 'templates/**'
      - 'api/**'
      - '.github/workflows/synthetic-monitor.yml'
  workflow_dispatch:

# Never run two monitors at once; don't cancel an in-flight one.
concurrency:
  group: synthetic-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      # On a code push, give Vercel time to build & deploy before we check prod,
      # otherwise we'd test the old (or mid-deploy) version and false-alarm.
      - name: Wait for Vercel deploy (push only)
        if: github.event_name == 'push'
        run: sleep 120
      - name: Run synthetic monitor
        env:
          BASE_URL: https://stickerhunt.club
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: '292048'
        run: node scripts/synthetic-monitor.mjs
