name: Reconcile Sticker Pages

# Belt-and-suspenders: catches stickers whose per-upload workflow run was
# cancelled / failed / never fired, and generates their static pages.
# Runs every 15 minutes; only commits if something was actually generated.

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:
    inputs:
      days:
        description: 'Limit scope to last N days (empty = full DB)'
        required: false
        type: string
        default: '7'

permissions:
  contents: write

# Share concurrency group with generate-sticker-pages so they don't push
# simultaneously. We never cancel — we wait.
concurrency:
  group: generate-pages
  cancel-in-progress: false

jobs:
  reconcile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: ./scripts
        run: npm install

      - name: Reconcile stickers
        id: reconcile
        working-directory: ./scripts
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          DAYS="${{ github.event.inputs.days }}"
          if [ "${{ github.event_name }}" = "schedule" ]; then
            # Cron path: keep scope tight to control runtime + API usage.
            DAYS="${DAYS:-7}"
          fi
          if [ -n "$DAYS" ]; then
            echo "Running reconcile with --days=$DAYS"
            node reconcile-stickers.js --days="$DAYS"
          else
            echo "Running full reconcile"
            node reconcile-stickers.js
          fi

      - name: Optimize any missing recent images (safety net)
        if: always()
        working-directory: ./scripts
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        continue-on-error: true
        run: node optimize-images.js --missing-only --days=2

      - name: Regenerate sitemaps if anything changed
        if: always()
        working-directory: ./scripts
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        continue-on-error: true
        run: |
          if [ -n "$(cd .. && git status --porcelain stickers/ clubs/ countries/)" ]; then
            echo "Changes detected, regenerating sitemaps..."
            node generate-sitemaps.js
          else
            echo "No changes — skipping sitemap regen."
          fi

      - name: Check for changes
        id: check
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "Changes:"; git status --porcelain | head -50
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push
        if: steps.check.outputs.has_changes == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add stickers/ clubs/ countries/ cities/ scripts/wiki-cache.json sitemap*.xml || true
          git commit -m "Auto-reconcile: regenerate orphaned sticker pages"

          # Same retry-with-rebase pattern as generate-sticker-pages.yml
          PUSHED=0
          for i in 1 2 3 4 5; do
            if git push; then PUSHED=1; break; fi
            echo "Push failed (attempt $i), rebasing onto origin/main with -X theirs..."
            git fetch origin main
            if ! git rebase --autostash -X theirs origin/main; then
              echo "Rebase could not auto-resolve, aborting and retrying..."
              git rebase --abort || true
            fi
            sleep $(( (RANDOM % 5) + i * 2 ))
          done
          if [ "$PUSHED" != "1" ]; then
            echo "::error::git push failed after 5 attempts"
            exit 1
          fi
